version: '3.3'

services:

  wildfly:
    build:
      context: .
      dockerfile: Dockerfile.wildfly
    container_name: wildfly
    ports:
      - "8080:8080"
      - "9990:9990"
    restart: always

  tomee:
    build:
      context: .
      dockerfile: Dockerfile.tomee
    container_name: tomee
    ports:
      - "8081:8080"
    restart: always

  tomee_micro:
    build:
      context: .
      dockerfile: Dockerfile.tomee_micro
    container_name: tomee_micro
    ports:
      - "8082:8080"
    restart: always
